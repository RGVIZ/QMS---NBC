    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        min-height: 100vh;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.45);
      }
      .glass-card-heavy {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(203, 213, 225, 0.6);
        transition: all 0.2s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(37, 99, 235, 0.7);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }
      /* Custom Animations */
      .anim-fade {
        animation: fadeIn 0.2s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
    <!-- Lucide Icons CDN -->

        </div>

        <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">

            <i data-lucide="bell" class="w-4 h-4"></i>

          <button onclick="switchTab('plans')" id="nav-plans" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer hover:bg-white/10 text-slate-350">

        <!-- Sidebar footer branding info -->
        <div class="p-6 border-t border-slate-755 text-center text-[10px] text-slate-505 font-medium space-y-1">
          <div>Standard Operating System</div>

      <!-- Main Workspace Panel -->
      <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        
        <!-- Top Workspace Bar -->
        <header class="h-16 bg-white/40 backdrop-blur-md border-b border-white/40 px-8 flex justify-between items-center shrink-0">

            <div class="w-8 h-8 rounded-full bg-slate-805 text-white font-extrabold text-xs flex items-center justify-center border border-white/60">
              QA
            </div>
          </div>
        </header>

        <!-- Primary App Content Chassis -->
        <div class="flex-1 p-8 space-y-8 max-w-7xl w-full mx-auto" id="app-workspace-flow">
          <!-- Views populated dynamically via Render Controllers -->
        </div>

    <!-- Modals Portals -->

        },

        }
      ];

      const INITIAL_PLANS = [
        {
          id: "PLAN-101",
          planName: "Q3 Automated Assembly Line 5S Inspection",
          templateId: "T-801",
          plant: "Tokyo Assembly Hub",
          leadAuditor: "Marcus Vance",
          auditorTeam: ["Elena Rostova", "Yuki Tanaka"],
          financialYear: "FY26",
          status: "In Progress",

          targetEndDate: "2026-06-24",
          scope: "Comprehensive audit focusing on precision machine calibration thresholds, tool wear logs, and raw feed component traceability indexes."
        },
        {
          id: "PLAN-102",
          planName: "Bi-Annual Cleanroom Gown & Zone 4 Inspection",
          templateId: "T-802",
          plant: "Munich Bio-medical Facility",
          leadAuditor: "Sarah Jenkins",
          auditorTeam: ["Amir Al-Otaibi"],
          financialYear: "FY26",
          status: "Planned",

          targetEndDate: "2026-07-12",

        }
      ];

      const INITIAL_LIBRARY_DOCS = [
        {

          category: "Regulatory Standards",

        },

        },
        {
          id: "DOC-ASME-8",
          title: "ASME Section VIII Boiler Pressure Component Benchmarks",
          category: "Certification Blueprints",

          lastUpdated: "2026-05-30",
          fileSize: "4.1 MB",

        }
      ];

      const CONSTANTS = {
        plants: ["Tokyo Assembly Hub", "Munich Bio-medical Facility", "Detroit Automotive Labs", "Singapore Chip Foundry"],

        categories: ["Standard Guidelines", "Regulatory Standards", "Certification Blueprints"]
      };

      // State Manager
      let state = {
        requests: [],
        plans: [],
        templates: [],
        libraryDocs: [],
        activeTab: "dashboard",
        
        // Active selections
        activeDocId: "DOC-9001",
        activeRequestId: "REQ-01",
        activePlanId: "PLAN-101",
        activeTemplateId: "T-801",

        // Search inputs
        requestsQuery: "",
        requestsCol: "title",
        plansQuery: "",
        plansCol: "planName",
        templatesQuery: "",
        templatesCol: "name",
        libraryQuery: "",
        libraryCat: "All Categories"
      };

      // Initialize Datastore
      function initStore() {
        const saved = localStorage.getItem("qms_system_store_v1");
        if (saved) {
          try {
            state = { ...state, ...JSON.parse(saved) };
          } catch (e) {
            console.error("Local Storage parse error, utilizing default matrices", e);
            preloadDefaults();
          }
        } else {
          preloadDefaults();
        }
        sanitizeState();
      }

      function preloadDefaults() {
        state.requests = [...INITIAL_REQUESTS];
        state.plans = [...INITIAL_PLANS];
        state.templates = [...INITIAL_TEMPLATES];
        state.libraryDocs = [...INITIAL_LIBRARY_DOCS];
        saveStore();
      }

      function sanitizeState() {
        if (!state.requests || state.requests.length === 0) state.requests = [...INITIAL_REQUESTS];
        if (!state.plans || state.plans.length === 0) state.plans = [...INITIAL_PLANS];
        if (!state.templates || state.templates.length === 0) state.templates = [...INITIAL_TEMPLATES];
        if (!state.libraryDocs || state.libraryDocs.length === 0) state.libraryDocs = [...INITIAL_LIBRARY_DOCS];
      }

      function saveStore() {
        localStorage.setItem("qms_system_store_v1", JSON.stringify({
          requests: state.requests,
          plans: state.plans,
          templates: state.templates,
          libraryDocs: state.libraryDocs,
          activeDocId: state.activeDocId,
          activeRequestId: state.activeRequestId,
          activePlanId: state.activePlanId,
          activeTemplateId: state.activeTemplateId
        }));
        // Update badge
        document.getElementById("badge-active-plans").textContent = state.plans.filter(p => p.status === 'In Progress').length;
      }

      // Live Notifier Toast Engine
      function showToast(title, message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `p-4 rounded-xl shadow-lg border text-sm flex items-start gap-3 anim-fade ${
          type === 'success' 
            ? 'bg-emerald-50 border-emerald-200 text-emerald-800' 
            : type === 'error'
              ? 'bg-rose-50 border-rose-200 text-rose-800'
              : 'bg-blue-50 border-blue-200 text-blue-800'
        }`;
        
        const icon = type === 'success' 
          ? '<i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-600 shrink-0"></i>' 
          : type === 'error'
            ? '<i data-lucide="alert-triangle" class="w-5 h-5 text-rose-600 shrink-0"></i>'
            : '<i data-lucide="info" class="w-5 h-5 text-blue-600 shrink-0"></i>';

        toast.innerHTML = `
          ${icon}
          <div>
            <div class="font-bold text-slate-805">${title}</div>
            <div class="text-xs opacity-90 mt-0.5">${message}</div>
          </div>
        `;
        container.appendChild(toast);
        lucide.createIcons();
        
        setTimeout(() => {
          toast.classList.add('opacity-0', 'transition-opacity', 'duration-300');
          setTimeout(() => {
            toast.remove();
          }, 350);
        }, 3200);
      }

      // Universal Tab Switcher
      function switchTab(tabId) {
        state.activeTab = tabId;
        
        // Remove active class from all sidebar buttons
        const navIds = ['dashboard', 'requests', 'plans', 'templates', 'library'];
        navIds.forEach(id => {
          const btn = document.getElementById(`nav-${id}`);
          if (btn) {
            btn.classList.remove('bg-white/10', 'text-white', 'border-l-4', 'border-blue-500');
            btn.classList.add('text-slate-350');
          }
        });

        // Set active class
        const currentBtn = document.getElementById(`nav-${tabId}`);
        if (currentBtn) {
          currentBtn.classList.add('bg-white/10', 'text-white', 'border-l-4', 'border-blue-500');
          currentBtn.classList.remove('text-slate-350');
        }

        renderWorkspace();
      }

      // Workspace Router Routing
      function renderWorkspace() {
        const clientWorkspace = document.getElementById("app-workspace-flow");
        clientWorkspace.innerHTML = "";

        if (state.activeTab === "dashboard") {
          renderDashboard(clientWorkspace);
        } else if (state.activeTab === "requests") {
          renderRequests(clientWorkspace);
        } else if (state.activeTab === "plans") {
          renderPlans(clientWorkspace);
        } else if (state.activeTab === "templates") {
          renderTemplates(clientWorkspace);
        } else if (state.activeTab === "library") {
          renderLibrary(clientWorkspace);
        }
        
        lucide.createIcons();
        saveStore();
      }

      // ----------------------------------------------------
      // 1. DASHBOARD VIEW RENDERER
      // ----------------------------------------------------

            </div>

              <!-- SVG Charts Panel (7 Cols) -->

          renderRequests(document.getElementById("app-workspace-flow"));

        const item = state.requests.find(r => r.id === id);

      function handleRequestSubmit(e) {
        e.preventDefault();
        const idNum = state.requests.length + 1;
        const newReq = {
          id: `REQ-${idNum < 10 ? '0' + idNum : idNum}`,
          title: document.getElementById("req-modal-title").value,
          auditType: document.getElementById("req-modal-type").value,
          department: document.getElementById("req-modal-dept").value,
          proposedDate: document.getElementById("req-modal-date").value,
          priority: document.getElementById("req-modal-priority").value,
          requestorName: document.getElementById("req-modal-name").value,
          reason: document.getElementById("req-modal-reason").value,
          status: "Pending Approval"
        };

        state.requests.unshift(newReq);
        state.activeRequestId = newReq.id;
        showToast("Proposal Submitted", `Adhoc proposal "${newReq.title}" has been securely logged.`);
        closeModal();
        renderRequests(document.getElementById("app-workspace-flow"));
      }

        downloadCSV(rows, "qms_adhoc_requests_index.csv");
      }

          <div class="glass-card-heavy rounded-2xl border border-white/50 shadow-2xl w-full max-w-lg overflow-hidden anim-fade">
            <div class="px-6 py-4 border-b border-white/30 bg-white/40 flex items-center justify-between">
              <h3 class="font-extrabold text-slate-805 flex items-center gap-1.5 text-sm">
                <i data-lucide="clipboard-list" class="w-5 h-5 text-blue-600"></i> Create QMS Checklist Template
              </h3>
              <button onclick="closeModal()" class="text-slate-505 hover:text-slate-805 text-xl font-bold cursor-pointer p-1">&times;</button>
            </div>
            
            <form onsubmit="handleTemplateSubmit(event)" class="p-6 space-y-4">
              <div>
                <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Checklist Template Title *</label>
                <input type="text" id="temp-modal-name" required placeholder="e.g. Cleanroom Visual Particulate & HEPA Filter Benchmarks" class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none" />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Audit Protocol Type *</label>
                  <select id="temp-modal-type" class="w-full px-3 py-2 glass-input rounded-lg text-sm bg-white/40 text-slate-805 focus:outline-none">
                    <option value="Calibration Audit">Calibration Audit</option>
                    <option value="Regulatory Compliance">Regulatory Compliance</option>
                    <option value="Safety Compliance">Safety Compliance</option>
                    <option value="Scheduled Manufacturing">Scheduled Manufacturing</option>
                  </select>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Assigned Lead Coordinators (Split by comma) *</label>
                  <input type="text" id="temp-modal-coords" required placeholder="Marcus Vance, Elena Rostova" class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none" />
                </div>
              </div>

              <!-- Checkpoint Criteria manager rows -->
              <div class="border-t border-slate-350/30 pt-4">
                <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-2">Checklist Standard Checkpoints *</label>
                
                <!-- Criteria builder interface -->
                <div class="flex gap-2 mb-3">
                  <input type="text" id="temp-criteria-input" placeholder="Add custom checkpoint line..." class="flex-1 px-3 py-2 bg-white/30 border border-slate-350/50 rounded-lg text-xs text-slate-805 focus:outline-none focus:bg-white/75" />
                  <button type="button" onclick="addModalCriteria()" class="px-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-bold transition-all shrink-0 cursor-pointer">Add Check</button>
                </div>

                <div class="space-y-1.5 max-h-32 overflow-y-auto p-2 bg-slate-805/5 border border-slate-805/10 rounded-xl" id="temp-modal-criteria-list">
                  <!-- Injected check row details -->
                </div>
              </div>

              <div class="pt-4 border-t border-white/30 flex items-center justify-end gap-3 font-semibold font-sans">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-350/50 hover:bg-slate-805/5 text-slate-705 text-xs rounded-lg transition-all cursor-pointer">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition-colors shadow-xs cursor-pointer">Save Blueprint</button>
              </div>
            </form>
          </div>
        `;
        modal.classList.remove("hidden");
        updateModalCriteriaList();
        lucide.createIcons();
      }

      function addModalCriteria() {
        const inp = document.getElementById("temp-criteria-input");
        if (inp && inp.value.trim().length > 0) {
          tempModalCriteria.push(inp.value.trim());
          inp.value = "";
          updateModalCriteriaList();
        }
      }

      function deleteModalCriteria(index) {
        tempModalCriteria.splice(index, 1);
        updateModalCriteriaList();
      }

      function updateModalCriteriaList() {
        const container = document.getElementById("temp-modal-criteria-list");
        if (!container) return;

        if (tempModalCriteria.length === 0) {
          container.innerHTML = `<span class="text-[10px] text-slate-505 block text-center font-bold">No standard checkpoints defined yet.</span>`;
          return;
        }

        container.innerHTML = tempModalCriteria.map((item, idx) => `
          <div class="flex items-center justify-between gap-3 p-2 bg-white/45 rounded border border-white/60 text-[11px] font-semibold text-slate-755">
            <span class="truncate">${idx + 1}. ${item}</span>
            <button type="button" onclick="deleteModalCriteria(${idx})" class="text-rose-600 hover:text-rose-800 font-bold shrink-0 cursor-pointer">&times;</button>
          </div>
        `).join('');
      }

      function handleTemplateSubmit(e) {
        e.preventDefault();
        if (tempModalCriteria.length === 0) {
          alert("Must add at least one checkpoint criteria!");
          return;
        }

        const countNum = state.templates.length + 801;
        const leadStr = document.getElementById("temp-modal-coords").value;
        const coordsArr = leadStr.split(",").map(s => s.trim()).filter(s => s.length > 0);

        const newTemp = {
          id: `T-${countNum}`,
          name: document.getElementById("temp-modal-name").value,
          auditType: document.getElementById("temp-modal-type").value,
          coordinators: coordsArr,
          status: true,
          criteria: [...tempModalCriteria]
        };

        state.templates.unshift(newTemp);
        state.activeTemplateId = newTemp.id;
        showToast("Blueprint Saved", `Template Blueprint "${newTemp.name}" created.`);
        closeModal();
        renderTemplates(document.getElementById("app-workspace-flow"));
      }

      function exportTemplatesCSV() {
        const rows = [
          ["ID", "Template Name", "Audit Protocol Type", "Coordinators", "Status", "Critera Items Count"],
          ...state.templates.map(t => [t.id, t.name, t.auditType, t.coordinators.join(' | '), t.status ? 'Active' : 'Inactive', t.criteria.length])
        ];
        downloadCSV(rows, "qms_template_blueprints_directory.csv");
      }

      // ----------------------------------------------------
      // 5. COMPLIANCE STANDARDS VIEW RENDERER
      // ----------------------------------------------------
      function renderLibrary(container) {
        const categories = ["All Categories", ...CONSTANTS.categories];
        
        const filteredDocs = state.libraryDocs.filter(doc => {
          const val = `${doc.title} ${doc.id} ${doc.description}`.toLowerCase();
          const matchesQuery = val.includes(state.libraryQuery.toLowerCase());
          const matchesCat = state.libraryCat === "All Categories" || doc.category === state.libraryCat;
          return matchesQuery && matchesCat;
        });

        const activeDoc = state.libraryDocs.find(d => d.id === state.activeDocId) || state.libraryDocs[0];

        const viewHTML = `
          <div class="space-y-6 anim-fade">
            <!-- Header items wrapper -->
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 bg-white/20 p-5 rounded-xl border border-white/35 shadow-xs">
              <div>
                <h1 class="text-2xl font-extrabold text-slate-805 tracking-tight flex items-center gap-2">
                  <i data-lucide="book-open" class="w-6 h-6 text-blue-600"></i> Compliance Standards Registry Library
                </h1>
                <p class="text-slate-655 font-bold text-xs mt-1">
                  Access regulatory standards, ISO publications, ASME specifications, and file footprints references.
                </p>
              </div>
              <button onclick="openLibraryRegModal()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-lg transition-all flex items-center justify-center gap-1.5 shadow-md shadow-blue-500/20 active:scale-95 cursor-pointer">
                <i data-lucide="plus" class="w-4 h-4"></i> Link Standard Reference
              </button>
            </div>

            <!-- Custom filter dashboard container -->
            <div class="glass-card p-4 rounded-xl border border-white/25 shadow-xs space-y-4">
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <i data-lucide="search" class="h-4 w-4 text-slate-500"></i>
                </span>
                <input type="text" id="library-search-input" value="${state.libraryQuery}" oninput="state.libraryQuery = this.value; renderLibrary(document.getElementById('app-workspace-flow'))" placeholder="Search standard guidelines, checklists, ISO keys, or document codes..." class="w-full pl-10 pr-4 py-2 bg-white/40 border border-white/25 rounded-lg focus:outline-none focus:bg-white/70 text-sm transition-all text-slate-805 placeholder-slate-455" />
              </div>

              <!-- Categories row checklist list -->
              <div class="flex flex-wrap gap-2.5">
                ${
                  categories.map(cat => {
                    const isActive = state.libraryCat === cat;
                    return `
                      <button onclick="setLibraryCategory('${cat}')" class="px-3.5 py-1.5 text-xs font-bold rounded-full transition-all border cursor-pointer ${
                        isActive 
                          ? 'bg-slate-805 text-white border-slate-805 shadow-xs' 
                          : 'bg-white/40 text-slate-705 border-white/60 hover:bg-white/70'
                      }">${cat}</button>
                    `;
                  }).join('')
                }
              </div>
            </div>

            <!-- Dual view mapping split panel -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
              
              <!-- Left list files panel (7 Cols) -->
              <div class="lg:col-span-7 space-y-3 max-h-[580px] overflow-y-auto pr-1">
                ${
                  filteredDocs.length === 0
                  ? `
                    <div class="glass-card rounded-xl p-12 text-center border border-dashed border-white/50">
                      <i data-lucide="file-text" class="w-10 h-10 text-slate-455 mx-auto mb-3"></i>
                      <p class="text-slate-800 font-extrabold">No safety publications match your filters.</p>
                    </div>
                  `
                  : filteredDocs.map(doc => {
                    const isActive = activeDoc && activeDoc.id === doc.id;
                    return `
                      <div onclick="selectLibraryDoc('${doc.id}')" class="p-4 rounded-xl transition-all border cursor-pointer flex items-start gap-4 ${
                        isActive 
                          ? 'bg-white/65 border-blue-500 shadow-md scale-[1.01]' 
                          : 'bg-white/30 border-white/40 hover:bg-white/50'
                      }">
                        <div class="p-2.5 rounded-lg shrink-0 ${isActive ? 'bg-blue-600/10 text-blue-750' : 'bg-white/40 text-slate-505 border border-white/40'}">
                          <i data-lucide="file-text" class="w-5 h-5"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                          <div class="flex items-center justify-between gap-2">
                            <span class="text-[9px] font-mono bg-white/50 border border-white/60 px-1.5 py-0.5 rounded text-slate-705 font-bold">${doc.id}</span>
                            <span class="text-[9px] text-slate-550 font-mono font-bold">${doc.fileSize}</span>
                          </div>
                          <h3 class="font-extrabold text-slate-850 mt-1 truncate text-sm">${doc.title}</h3>
                          <p class="text-xs text-slate-655 mt-1 line-clamp-2 leading-relaxed">${doc.description}</p>
                          
                          <div class="flex items-center justify-between mt-3 text-[10px] font-bold">
                            <span class="bg-white/50 text-[9px] border border-white/70 text-slate-755 px-2 py-0.5 rounded-xs">${doc.category}</span>
                            <span class="text-blue-750 text-[10px]">Version ${doc.version}</span>
                          </div>
                        </div>
                      </div>
                    `;
                  }).join('')
                }
              </div>

              <!-- Right detail parameters reader (5 Cols) -->
              <div class="lg:col-span-5">
                ${
                  activeDoc
                  ? `
                    <div class="glass-card rounded-xl border border-white/30 shadow-md p-6 space-y-6">
                      <div class="flex items-center gap-3 pb-4 border-b border-white/20">
                        <div class="p-3 bg-blue-500/10 text-blue-750 rounded-xl border border-white/40">
                          <i data-lucide="check-circle" class="w-6 h-6"></i>
                        </div>
                        <div>
                          <span class="px-2.5 py-0.5 bg-blue-600/10 text-blue-800 rounded text-[10px] font-extrabold font-mono border border-blue-500/20">APPROVED REGISTRY PUBLISHED</span>
                          <h2 class="text-base font-extrabold text-slate-805 mt-1.5 leading-tight">${activeDoc.title}</h2>
                        </div>
                      </div>

                      <div class="space-y-4">
                        <div>
                          <h4 class="text-[10px] font-bold text-slate-450 uppercase tracking-wider mb-1">Standard Scope Summary</h4>
                          <p class="text-xs text-slate-655 leading-relaxed font-semibold">${activeDoc.description}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                          <div class="p-3 bg-white/40 border border-white/50 rounded-lg">
                            <span class="text-[9px] text-slate-450 font-bold block">CATEGORY</span>
                            <span class="text-xs font-bold text-slate-850 block mt-0.5 truncate">${activeDoc.category}</span>
                          </div>
                          <div class="p-3 bg-white/40 border border-white/50 rounded-lg">
                            <span class="text-[9px] text-slate-450 font-bold block">REVISION VERSION</span>
                            <span class="text-xs font-bold text-slate-850 block mt-0.5 font-mono">${activeDoc.version}</span>
                          </div>
                          <div class="p-3 bg-white/40 border border-white/50 rounded-lg">
                            <span class="text-[9px] text-slate-450 font-bold block">LAST RE-VERIFIED</span>
                            <span class="text-xs font-bold text-slate-850 block mt-0.5 font-mono">${activeDoc.lastUpdated}</span>
                          </div>
                          <div class="p-3 bg-white/40 border border-white/50 rounded-lg">
                            <span class="text-[9px] text-slate-450 font-bold block">STATIC FOOTPRINT</span>
                            <span class="text-xs font-bold text-slate-850 block mt-0.5 font-mono">${activeDoc.fileSize}</span>
                          </div>
                        </div>
                      </div>

                      <div class="pt-4 border-t border-white/20 flex flex-col gap-2">
                        <button onclick="simulatePdfDownload('${activeDoc.title}')" class="w-full py-2.5 bg-slate-805 text-white hover:bg-slate-900 rounded-lg transition-all font-bold text-xs flex items-center justify-center gap-2 cursor-pointer shadow-xs active:scale-95">
                          <i data-lucide="download" class="w-4 h-4 text-white animate-bounce"></i> Download Approved Publication PDF
                        </button>
                        <div class="p-2.5 bg-emerald-50 border border-emerald-100 rounded-xl text-[10px] text-emerald-800 text-center font-bold flex items-center justify-center gap-1">
                          <i data-lucide="shield" class="w-3.5 h-3.5 text-emerald-600"></i> Standard verified via secure active QMS registry ledger
                        </div>
                      </div>
                    </div>
                  `
                  : `
                    <div class="glass-card rounded-xl border border-white/30 p-12 text-center text-slate-455">
                      Select publications to review metadata outlines.
                    </div>
                  `
                }
              </div>

            </div>
          </div>
        `;

        container.innerHTML = viewHTML;
      }

      function selectLibraryDoc(id) {
        state.activeDocId = id;
        renderLibrary(document.getElementById("app-workspace-flow"));
        lucide.createIcons();
      }

      function setLibraryCategory(cat) {
        state.libraryCat = cat;
        renderLibrary(document.getElementById("app-workspace-flow"));
        lucide.createIcons();
      }

      function simulatePdfDownload(title) {
        showToast("Publication Downloaded", `Completed file transfer of standard framework parameters: "${title}".`);
      }

      // Add Document reference modal
      function openLibraryRegModal() {
        const modal = document.getElementById("modal-portal");
        modal.innerHTML = `
          <div class="glass-card-heavy rounded-2xl border border-white/50 shadow-2xl w-full max-w-lg overflow-hidden anim-fade">
            <div class="px-6 py-4 border-b border-white/30 bg-white/40 flex items-center justify-between">
              <h3 class="font-extrabold text-slate-805 flex items-center gap-1.5 text-sm">
                <i data-lucide="book-open" class="w-5 h-5 text-blue-600"></i> Link Standard Certified Reference
              </h3>
              <button onclick="closeModal()" class="text-slate-505 hover:text-slate-805 text-xl font-bold cursor-pointer p-1">&times;</button>
            </div>
            
            <form onsubmit="handleLibrarySubmit(event)" class="p-6 space-y-4">
              <div>
                <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Standard Document Title *</label>
                <input type="text" id="lib-modal-title" required placeholder="e.g. ISO 45001 Occupational Health Safety" class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none" />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Standard Category *</label>
                  <select id="lib-modal-category" class="w-full px-3 py-2 glass-input rounded-lg text-sm bg-white/40 text-slate-805 focus:outline-none">
                    ${
                      CONSTANTS.categories.map(c => `<option value="${c}">${c}</option>`).join('')
                    }
                  </select>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Index Code / Key *</label>
                  <input type="text" id="lib-modal-id" required placeholder="e.g. DOC-9904" class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none" />
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Revision Level Code *</label>
                  <input type="text" id="lib-modal-version" required placeholder="e.g. v2.1" class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none" />
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Index Footprint Size *</label>
                  <select id="lib-modal-size" class="w-full px-3 py-2 glass-input rounded-lg text-sm bg-white/40 text-slate-805 focus:outline-none">
                    <option value="1.2 MB">1.2 MB</option>
                    <option value="2.5 MB">2.5 MB</option>
                    <option value="3.6 MB">3.6 MB</option>
                    <option value="4.8 MB">4.8 MB</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-[10px] font-bold text-slate-505 uppercase tracking-wider mb-1">Brief Description of Guidelines *</label>
                <textarea id="lib-modal-description" required rows="3" placeholder="Outline primary validation procedures, metrics targets, auditor recommendations, and checkpoints safety boundaries..." class="w-full px-3 py-2 glass-input rounded-lg text-sm text-slate-805 focus:outline-none"></textarea>
              </div>

              <div class="pt-4 border-t border-white/30 flex items-center justify-end gap-3 font-semibold">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border border-slate-350/50 hover:bg-slate-805/5 text-slate-705 text-xs rounded-lg transition-all cursor-pointer">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition-colors shadow-xs cursor-pointer">Register Code Link</button>
              </div>
            </form>
          </div>
        `;
        modal.classList.remove("hidden");
        lucide.createIcons();
      }

      function handleLibrarySubmit(e) {
        e.preventDefault();
        const codeKey = document.getElementById("lib-modal-id").value.trim().toUpperCase();
        
        // check duplicate
        if (state.libraryDocs.some(d => d.id === codeKey)) {
          alert(`Document registry entry with key code ${codeKey} already exists!`);
          return;
        }

        const dateNow = new Date().toISOString().split("T")[0];

        const newDoc = {
          id: codeKey,
          title: document.getElementById("lib-modal-title").value,
          category: document.getElementById("lib-modal-category").value,
          version: document.getElementById("lib-modal-version").value,
          lastUpdated: dateNow,
          fileSize: document.getElementById("lib-modal-size").value,
          description: document.getElementById("lib-modal-description").value
        };

        state.libraryDocs.unshift(newDoc);
        state.activeDocId = newDoc.id;
        showToast("Standard Registered", `Publication document Reference "${newDoc.title}" registered successfully.`);
        closeModal();
        renderLibrary(document.getElementById("app-workspace-flow"));
      }


      // ----------------------------------------------------
      // UTILITY HELPER CODE
      // ----------------------------------------------------
      function closeModal() {
        const modal = document.getElementById("modal-portal");
        modal.innerHTML = "";
        modal.classList.add("hidden");
      }

      function downloadCSV(rows, fileName) {
        const csvContent = "data:text/csv;charset=utf-8," 
          + rows.map(r => r.map(cell => `"${(cell || "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", fileName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("CSV Download Initiated", `Your ledger download has been processed as ${fileName}`);
      }

      // Initial Bootstrap execution
      window.addEventListener('DOMContentLoaded', () => {
        initStore();
        switchTab("dashboard");
      });
    </script>
  </body>
